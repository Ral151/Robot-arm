# Robot arm hardware configuration
robot:
  port: /dev/ttyUSB0 # Serial port for Dobot connection
  baudrate: 115200
  home_position:
    x: 200.0 # mm
    y: 0.0
    z: 50.0
    r: 0.0 # rotation (degrees)

  # Sorting bin locations for Robot Arm Challenge
  sorting_bins:
    nut: # Bin for nuts
      x: 250.0
      y: -100.0
      z: 10.0
      r: 0.0
    bolt: # Bin for bolts
      x: 250.0
      y: 0.0
      z: 10.0
      r: 0.0
    screw: # Bin for screws
      x: 250.0
      y: 100.0
      z: 10.0
      r: 0.0

  # Pickup zone (above the source bin/container)
  pickup_zone:
    x: 150.0
    y: 0.0
    z_safe: 80.0 # Safe height above bin
    z_bin: 10.0 # Fixed depth of the container plate

  workspace:
    x_min: 100.0
    x_max: 320.0
    y_min: -150.0
    y_max: 150.0
    z_min: 0.0
    z_max: 100.0
  speed: 80 # mm/s (increased for competition speed)
  acceleration: 80 # mm/s^2

  # Gripper configuration (replaces suction)
  gripper:
    close_value: 480 # PWM value for closed gripper (gripping)
    open_value: 200 # PWM value for open gripper (releasing)
    close_delay: 0.5 # seconds to wait after closing
    open_delay: 0.3 # seconds to wait after opening
