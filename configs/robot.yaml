# Robot arm hardware configuration
robot:
  port: /dev/ttyUSB0       # Serial port for Dobot connection
  baudrate: 115200
  home_position:
    x: 200.0               # mm
    y: 0.0
    z: 50.0
    r: 0.0                 # rotation (degrees)
  workspace:
    x_min: 150.0
    x_max: 320.0
    y_min: -150.0
    y_max: 150.0
    z_min: -50.0
    z_max: 100.0
  speed: 50                # mm/s
  acceleration: 50         # mm/s^2
  suction:
    on_delay: 0.5          # seconds
    off_delay: 0.3
