# Object classes for YOLO detection - Robot Arm Challenge
# Format: id: name
classes:
  0: long_bolt
  1: nut
  2: short_bolt

# Target selection priority (highest first)
priority:
  - long_bolt
  - short_bolt
  - nut

# Detection thresholds per class (optional overrides)
thresholds:
  default: 0.5
  nut: 0.55
  long_bolt: 0.55
  short_bolt: 0.55
